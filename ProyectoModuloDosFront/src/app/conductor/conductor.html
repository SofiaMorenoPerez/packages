<div class="container">
  <h2 class="titulo">{{ modoEdicion ? 'Editar Conductor' : 'Registrar Conductor' }}</h2>

  <div class="campo">
    <label>Nombre</label>
    <input type="text" [(ngModel)]="nombre" placeholder="Ej. Juan Pérez" />
  </div>

  <div class="campo">
    <label>Edad</label>
    <input type="number" [(ngModel)]="edad" placeholder="Ej. 30" />
  </div>

  <div class="campo">
    <label>Fecha Inicio</label>
    <input type="datetime-local" [(ngModel)]="fechaInicio" />
  </div>

  <div class="campo">
    <label>Tipo de Vehículo</label>
    <input type="text" [(ngModel)]="tipoVehiculo" placeholder="Ej. Camión" />
  </div>

  <button class="btn-guardar" (click)="guardar()">{{ modoEdicion ? 'Actualizar' : 'Guardar' }}</button>
  <button class="btn-cancelar" (click)="limpiarFormulario()" *ngIf="modoEdicion">Cancelar</button>

  <hr class="separador" />

  <h2 class="titulo">Lista de Conductores</h2>

  <table class="tabla">
    <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Edad</th>
      <th>Fecha Inicio</th>
      <th>Tipo de Vehículo</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let c of conductoresLista">
      <td>{{ c.id }}</td>
      <td>{{ c.nombre }}</td>
      <td>{{ c.edad }}</td>
      <td>{{ c.fechaInicio }}</td>
      <td>{{ c.tipoVehiculo }}</td>
      <td>
        <button class="btn-editar" (click)="editar(c)">Editar</button>
        <button class="btn-eliminar" (click)="eliminar(c.id!)">Eliminar</button>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="conductorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header" [ngStyle]="{'background-color': toastColor}">
        <strong class="me-auto">{{ toastTitulo }}</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body">
        {{ toastMensaje }}
      </div>
    </div>
  </div>
</div>
